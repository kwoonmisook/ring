<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>반지 사이즈 계산기</title>

<style>

body{
    margin:0;
    padding:0;
    background:#eef2ff;
    font-family:'Malgun Gothic',sans-serif;
}

.container{
    width:1100px;
    margin:30px auto;
    text-align:center;
}

.title{
    font-size:54px;
    font-weight:bold;
    color:#1f4fff;
    margin-bottom:25px;
}

.top-image img{
    width:100%;
    max-width:900px;
    border-radius:10px;
}

.main-wrap{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

.card{
    background:white;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:35px;
    width:430px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card-title{
    font-size:34px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:35px;
}

.input-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.input-row label{
    font-size:26px;
    color:#222;
}

.input-row input{
    width:150px;
    padding:12px;
    font-size:26px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#f8fafc;

    border:2px solid #d1d5db;
}

.input-row input:focus{
    border:2px solid #2563eb;
}

.calc-btn{
    margin-top:35px;
    background:#1f4fff;
    color:white;
    border:none;
    border-radius:10px;
    font-size:28px;
    font-weight:bold;
    padding:18px 40px;
    cursor:pointer;
    transition:0.2s;
}

.calc-btn:hover{
    background:#163fd1;
}

.result-box{
    margin-top:20px;
    text-align:left;
    line-height:2;
    font-size:28px;
    color:#222;
}

.recommend{
    margin-top:25px;
    font-size:42px;
    font-weight:bold;
    color:#16a34a;
    text-align:center;
}

@media(max-width:1200px){

.container{
    width:95%;
}

.card{
    width:100%;
}

.title{
    font-size:42px;
}

.input-row label{
    font-size:20px;
}

.input-row input{
    width:120px;
    font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        반지 사이즈 계산기
    </div>

    <div class="top-image">
        <img src="finger.png">
    </div>

    <div class="main-wrap">

        <!-- 입력 카드 -->
        <div class="card">

            <div class="card-title">
                측정값 입력
            </div>

            <div class="input-row">
                <label>손가락 중간 뼈길이(mm)</label>
                <input type="number" id="bone">
            </div>

            <div class="input-row">
                <label>안쪽마디 살길이(mm)</label>
                <input type="number" id="flesh">
            </div>

            <button class="calc-btn" onclick="calculate()">
                사이즈 계산하기
            </button>

        </div>

        <!-- 결과 카드 -->
        <div class="card">

            <div class="card-title">
                💍 추천 반지 사이즈
            </div>

            <div class="result-box" id="result">
                측정값을 입력 후 계산 버튼을 눌러주세요
            </div>

            <div class="recommend" id="recommend"></div>

        </div>

    </div>

</div>

<script>

function ringSize(diameter){

    const sizeChart = {
        1:13.0,
        2:13.3,
        3:13.6,
        4:14.0,
        5:14.3,
        6:14.6,
        7:15.0,
        8:15.3,
        9:15.6,
        10:16.0,
        11:16.3,
        12:16.6,
        13:17.0,
        14:17.3,
        15:17.6,
        16:18.0,
        17:18.3,
        18:18.6,
        19:19.0,
        20:19.3,
        21:19.6,
        22:20.0,
        23:20.3,
        24:20.6,
        25:21.0,
        26:21.3,
        27:21.6,
        28:22.0,
        29:22.3,
        30:22.6
    };

    let closest = 1;
    let minDiff = 999;

    for(let size in sizeChart){

        let diff = Math.abs(sizeChart[size] - diameter);

        if(diff < minDiff){
            minDiff = diff;
            closest = size;
        }
    }

    return closest;
}

function calculate(){

    const bone = parseFloat(document.getElementById("bone").value);
    const flesh = parseFloat(document.getElementById("flesh").value);

    if(isNaN(bone) || isNaN(flesh)){

        document.getElementById("result").innerHTML =
        "숫자를 입력해주세요.";

        return;
    }

    // 일반 두께링
    const correctedValue = ((bone + flesh) / 2) + 0.5;
    const correctedSize = ringSize(correctedValue);

    // 얇은 링
    const normalValue = (bone + flesh) / 2;
    const normalSize = ringSize(normalValue);

    // 뼈가 두꺼운 손
    const boneValue = bone;
    const boneSize = ringSize(boneValue);

    document.getElementById("result").innerHTML = `
        💍 일반 두께링 : 한국 ${correctedSize}호<br><br>
        🖐 얇은 링 : 한국 ${normalSize}호<br><br>
        💎 뼈가 두꺼운 손 : 한국 ${boneSize}호
    `;

    document.getElementById("recommend").innerHTML =
    `추천 링 호수 : ${correctedSize}호`;
}

</script>

</body>
</html>
